name: Daily Sync

on:
  schedule:
    - cron: '0 2 * * *'   # 23h BRT (UTC-3) = 02:00 UTC
  workflow_dispatch:        # permite rodar manualmente pelo GitHub

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests playwright beautifulsoup4
          playwright install chromium --with-deps

      - name: Run daily sync
        env:
          CANTUCCI_OS_USER:       julhyana
          CANTUCCI_OS_PASS:       ${{ secrets.CANTUCCI_OS_PASS }}
          FALAE_EMAIL:            operacoes@cantucci.com.br
          FALAE_SENHA:            ${{ secrets.FALAE_SENHA }}
          DASHBOARD3V_EMAIL:      operacoes@cantucci.com.br
          DASHBOARD3V_SENHA:      ${{ secrets.DASHBOARD3V_SENHA }}
          CHECKLIST_EMAIL:        operacoes@cantucci.com.br
          CHECKLIST_SENHA:        ${{ secrets.CHECKLIST_SENHA }}
        run: python daily_sync.py

      - name: Generate HTML
        run: python daily_html.py

      - name: Copy HTML to index
        run: cp DAILY_REPORT.html index.html

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html DAILY_CACHE.json HISTORICO_DIARIO.json HISTORICO_MATURIDADE.json
          git diff --staged --quiet || git commit -m "Report $(date '+%Y-%m-%d')"
          git push
